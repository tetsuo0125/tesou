<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060310" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="手相占い" />
  <title>✋ 神秘の手相鑑定</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&display=swap');

    :root {
      --bg:       #060310;
      --bg2:      #0e0820;
      --surface:  #120a2a;
      --border:   #4a2d7a;
      --gold:     #c9a84c;
      --gold2:    #f0d080;
      --silver:   #a8b4c8;
      --mystic:   #7c3aed;
      --mystic2:  #a855f7;
      --crimson:  #9f1239;
      --text:     #e8dff5;
      --muted:    #8577a0;
      --radius:   16px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overscroll-behavior-y: none;
      padding-bottom: var(--safe-bottom);
      overflow-x: hidden;
    }

    /* ========== 背景レイヤー ========== */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* 深宇宙グラデーション */
    .bg-cosmos {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(76,29,149,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(124,58,237,0.20) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(14,8,32,1) 40%, rgba(6,3,16,1) 100%);
    }

    /* 星フィールド */
    .bg-stars {
      background-image:
        radial-gradient(1px 1px at  8%  5%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(1px 1px at 32%  8%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px 1px at 47% 18%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 63%  4%, rgba(255,255,255,0.80) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 14%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 88%  9%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1px 1px at  5% 35%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 42%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 55%, rgba(255,255,255,0.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 48%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 38%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(1px 1px at 12% 68%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 28% 75%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 82%, rgba(255,255,255,0.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 88%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 72%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(2px 2px at 15% 15%, rgba(201,168,76,0.55) 0%, transparent 100%),
        radial-gradient(2px 2px at 62% 28%, rgba(168,85,247,0.50) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 45%, rgba(201,168,76,0.40) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 88%, rgba(168,85,247,0.45) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 44% 62%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 95% 30%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at  2% 90%, rgba(255,255,255,0.50) 0%, transparent 100%);
      animation: stars-drift 120s linear infinite;
    }

    @keyframes stars-drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-3px); }
    }

    /* 霧のようなオーロラ */
    .bg-aurora {
      background:
        radial-gradient(ellipse 40% 25% at 30% 25%, rgba(124,58,237,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 35% 20% at 70% 70%, rgba(201,168,76,0.08) 0%, transparent 70%);
      animation: aurora-pulse 8s ease-in-out infinite alternate;
    }

    @keyframes aurora-pulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* ========== 装飾的な区切り線 ========== */
    .ornament {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0.5rem 0;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }
    .ornament-symbol {
      color: var(--gold);
      font-size: 0.9rem;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* ========== ヘッダー ========== */
    header {
      width: 100%;
      text-align: center;
      padding: calc(2rem + var(--safe-top)) 1.2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .header-eye {
      font-size: clamp(2.4rem, 10vw, 3.4rem);
      display: block;
      margin-bottom: 0.5rem;
      animation: eye-glow 4s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(201,168,76,0.6));
    }

    @keyframes eye-glow {
      0%,100% { filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
      50%      { filter: drop-shadow(0 0 28px rgba(201,168,76,0.9)) drop-shadow(0 0 50px rgba(124,58,237,0.4)); }
    }

    header h1 {
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    .header-sub {
      color: var(--muted);
      font-size: clamp(0.72rem, 3vw, 0.85rem);
      letter-spacing: 0.08em;
      margin-top: 0.6rem;
      font-weight: 300;
    }

    /* ========== コンテナ ========== */
    .container {
      width: 100%;
      max-width: 680px;
      padding: 0 calc(0.9rem + var(--safe-left)) calc(2.5rem + var(--safe-bottom)) calc(0.9rem + var(--safe-right));
      position: relative;
      z-index: 1;
    }

    /* ========== カード共通 ========== */
    .mystic-card {
      background: linear-gradient(145deg, rgba(18,10,42,0.95), rgba(22,12,50,0.90));
      border: 1px solid rgba(74,45,122,0.6);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    /* カード上の光沢ライン */
    .mystic-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
    }

    /* ========== アップロードエリア ========== */
    .upload-card {
      padding: 2.2rem 1.5rem 1.8rem;
      text-align: center;
      transition: border-color 0.3s;
      border: 1px solid rgba(74,45,122,0.5);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(18,10,42,0.95), rgba(22,12,50,0.90));
      position: relative;
      overflow: hidden;
    }

    /* コーナー装飾 */
    .upload-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 40%),
        linear-gradient(315deg, rgba(124,58,237,0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    .upload-card.drag-over {
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(201,168,76,0.15), inset 0 0 30px rgba(201,168,76,0.05);
    }

    .upload-card .eye-icon {
      font-size: clamp(3rem, 11vw, 4.2rem);
      display: block;
      margin-bottom: 1rem;
      animation: float-eye 4s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(201,168,76,0.55));
    }

    @keyframes float-eye {
      0%,100% {
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 0 14px rgba(201,168,76,0.5));
      }
      50% {
        transform: translateY(-8px) scale(1.04);
        filter: drop-shadow(0 0 26px rgba(168,85,247,0.65)) drop-shadow(0 0 40px rgba(201,168,76,0.3));
      }
    }

    .upload-card h2 {
      font-size: clamp(1rem, 4.5vw, 1.2rem);
      color: var(--gold2);
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .upload-card .sub {
      color: var(--muted);
      font-size: clamp(0.72rem, 2.8vw, 0.8rem);
      letter-spacing: 0.04em;
      font-weight: 300;
    }

    /* ========== ボタン ========== */
    .btn-row {
      display: flex;
      gap: 0.65rem;
      justify-content: center;
      margin-top: 1.4rem;
      flex-wrap: wrap;
    }

    button {
      min-height: 48px;
      padding: 0 1.4rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: clamp(0.82rem, 3.3vw, 0.9rem);
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      overflow: hidden;
    }

    button:active {
      transform: scale(0.96) !important;
      opacity: 0.85;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a1942, #7c1d6f, #4a1942);
      background-size: 200% 100%;
      color: var(--gold2);
      border: 1px solid rgba(201,168,76,0.35);
      box-shadow: 0 0 20px rgba(124,29,111,0.4), inset 0 1px 0 rgba(201,168,76,0.15);
      animation: btn-shimmer 4s ease infinite;
    }

    @keyframes btn-shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    @media (hover: hover) {
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 32px rgba(168,85,247,0.5), 0 0 60px rgba(201,168,76,0.15);
        border-color: rgba(201,168,76,0.6);
      }
    }

    .btn-secondary {
      background: rgba(18,10,42,0.8);
      border: 1px solid rgba(74,45,122,0.7);
      color: var(--silver);
    }

    @media (hover: hover) {
      .btn-secondary:hover {
        border-color: var(--gold);
        color: var(--gold2);
        box-shadow: 0 0 16px rgba(201,168,76,0.2);
      }
    }

    #fileInput, #cameraInput { display: none; }

    /* ========== プレビュー ========== */
    .preview-area {
      display: none;
      margin-top: 1.2rem;
      text-align: center;
    }

    .preview-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .preview-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: calc(var(--radius) + 2px);
      background: linear-gradient(135deg, var(--gold), var(--mystic2), var(--gold));
      z-index: 0;
      opacity: 0.5;
    }

    .preview-wrap img {
      width: 100%;
      max-height: 55vw;
      border-radius: var(--radius);
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .preview-retake {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      background: rgba(6,3,16,0.82);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold2);
      border-radius: 4px;
      padding: 0 0.9rem;
      min-height: 36px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      letter-spacing: 0.04em;
    }

    .analyze-btn {
      margin-top: 1.2rem;
      background: linear-gradient(135deg, #1e0a3c, #4a1942, #1e0a3c);
      background-size: 200% 100%;
      color: var(--gold2);
      width: 100%;
      min-height: 58px;
      font-size: clamp(1rem, 4.5vw, 1.1rem);
      border-radius: 4px;
      border: 1px solid rgba(201,168,76,0.45);
      box-shadow: 0 0 28px rgba(74,25,66,0.5), inset 0 1px 0 rgba(201,168,76,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      letter-spacing: 0.1em;
      animation: btn-shimmer 4s ease infinite;
    }

    @media (hover: hover) {
      .analyze-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 0 40px rgba(201,168,76,0.3), 0 0 80px rgba(124,58,237,0.2);
      }
    }

    .analyze-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ========== ローディング ========== */
    .loading {
      display: none;
      text-align: center;
      padding: 3rem 1.5rem 2.5rem;
      margin-top: 1.2rem;
    }

    .loading-inner {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .crystal {
      font-size: clamp(3.5rem, 14vw, 5rem);
      display: block;
      animation: crystal-float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(168,85,247,0.7)) drop-shadow(0 0 48px rgba(201,168,76,0.3));
    }

    @keyframes crystal-float {
      0%,100% { transform: translateY(0) rotate(-2deg) scale(1); }
      50%      { transform: translateY(-16px) rotate(2deg) scale(1.06); }
    }

    /* 回転するリング */
    .crystal-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 90px; height: 90px;
      margin: -45px;
      border: 1.5px solid rgba(201,168,76,0.3);
      border-top-color: rgba(201,168,76,0.8);
      border-radius: 50%;
      animation: ring-spin 2s linear infinite;
    }

    .crystal-ring2 {
      position: absolute;
      top: 50%; left: 50%;
      width: 115px; height: 115px;
      margin: -57.5px;
      border: 1px solid rgba(168,85,247,0.2);
      border-bottom-color: rgba(168,85,247,0.6);
      border-radius: 50%;
      animation: ring-spin 3s linear infinite reverse;
    }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-title {
      color: var(--gold2);
      font-size: clamp(0.95rem, 4vw, 1.1rem);
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .loading-sub {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: clamp(0.75rem, 3vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    .loading .dots::after {
      content: '';
      animation: dots 1.8s infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '・'; }
      50%  { content: '・・'; }
      75%  { content: '・・・'; }
      100% { content: ''; }
    }

    /* ========== 結果 ========== */
    .result { display: none; margin-top: 1.2rem; }

    .result-card {
      margin-bottom: 1rem;
      padding: clamp(1.2rem, 4.5vw, 1.8rem);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .card-header-icon {
      font-size: 1.1rem;
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.6));
    }

    .card-header h3 {
      font-size: clamp(0.85rem, 3.5vw, 0.98rem);
      color: var(--gold);
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .card-header-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }

    .overall-text {
      color: var(--text);
      line-height: 2;
      font-size: clamp(0.85rem, 3.4vw, 0.96rem);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* 手相の線 */
    .line-item {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(74,45,122,0.3);
    }

    .line-item:last-child { border-bottom: none; }

    .line-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }

    .line-name {
      font-weight: 600;
      color: var(--gold2);
      font-size: clamp(0.85rem, 3.4vw, 0.95rem);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.05em;
    }

    .luck-stars { display: flex; gap: 2px; }

    .star { font-size: clamp(0.78rem, 3vw, 0.88rem); }
    .star.filled { filter: drop-shadow(0 0 4px rgba(201,168,76,0.8)); }

    .line-reading {
      color: var(--silver);
      font-size: clamp(0.80rem, 3.1vw, 0.88rem);
      line-height: 1.85;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* 運勢グリッド */
    .fortune-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .fortune-item {
      background: rgba(14,8,32,0.7);
      border: 1px solid rgba(74,45,122,0.4);
      border-radius: 10px;
      padding: 0.9rem;
      position: relative;
      overflow: hidden;
    }

    .fortune-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }

    .fortune-item .label {
      font-size: clamp(0.68rem, 2.7vw, 0.74rem);
      color: var(--gold);
      margin-bottom: 0.35rem;
      letter-spacing: 0.06em;
    }

    .fortune-item .value {
      font-size: clamp(0.78rem, 3.1vw, 0.86rem);
      color: var(--silver);
      line-height: 1.7;
      font-weight: 300;
    }

    /* ラッキー */
    .lucky-grid {
      display: flex;
      gap: 0.65rem;
    }

    .lucky-item {
      flex: 1;
      background: linear-gradient(145deg, rgba(18,10,42,0.9), rgba(30,10,60,0.8));
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 1rem 0.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .lucky-item::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent);
    }

    .lucky-item .label {
      font-size: clamp(0.62rem, 2.5vw, 0.70rem);
      color: var(--gold);
      margin-bottom: 0.35rem;
      letter-spacing: 0.08em;
    }

    .lucky-item .value {
      font-size: clamp(0.92rem, 3.8vw, 1.05rem);
      font-weight: 700;
      color: var(--gold2);
      letter-spacing: 0.04em;
    }

    /* アドバイス */
    .advice-text {
      color: var(--text);
      line-height: 2;
      font-size: clamp(0.83rem, 3.3vw, 0.94rem);
      padding: 1.1rem 1.2rem;
      background: linear-gradient(135deg, rgba(74,25,66,0.15), rgba(30,10,60,0.2));
      border-left: 2px solid rgba(201,168,76,0.5);
      border-radius: 0 10px 10px 0;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* エラー */
    .error-msg {
      background: rgba(159,18,57,0.12);
      border: 1px solid rgba(159,18,57,0.4);
      border-radius: 10px;
      padding: 1.2rem;
      color: #f4a0b0;
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.88rem;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .reset-btn {
      width: 100%;
      margin-top: 0.8rem;
      background: transparent;
      border: 1px solid rgba(74,45,122,0.5);
      color: var(--muted);
      min-height: 50px;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }

    @media (hover: hover) {
      .reset-btn:hover {
        border-color: var(--gold);
        color: var(--gold2);
        box-shadow: 0 0 16px rgba(201,168,76,0.12);
      }
    }

    /* ========== フッター ========== */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.65rem, 2.6vw, 0.74rem);
      padding: 1.5rem 1rem;
      position: relative;
      z-index: 1;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* ========== カメラ ========== */
    .camera-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .camera-overlay.open { display: flex; }

    .camera-overlay video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    .camera-guide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 300px);
      height: min(70vw, 300px);
      border: 2px solid rgba(201,168,76,0.6);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4), 0 0 30px rgba(201,168,76,0.2);
    }

    /* コーナー装飾 */
    .camera-guide::before,
    .camera-guide::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }
    .camera-guide::before {
      top: -3px; left: -3px;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0;
    }
    .camera-guide::after {
      bottom: -3px; right: -3px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0;
    }

    .camera-guide-text {
      position: absolute;
      bottom: -2.4rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(201,168,76,0.8);
      font-size: 0.75rem;
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: 0.06em;
    }

    .camera-controls {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      gap: 1rem;
    }

    .camera-shutter {
      width: 72px;
      height: 72px;
      padding: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 0 6px rgba(255,255,255,0.08);
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-shutter::after {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,208,128,0.85));
      box-shadow: 0 0 12px rgba(201,168,76,0.5);
    }

    .camera-shutter:active { transform: scale(0.88); }
    .camera-shutter:active::after { background: rgba(201,168,76,0.9); }

    .camera-close {
      min-height: 48px;
      padding: 0 1.2rem;
      background: rgba(6,3,16,0.6);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold2);
      border-radius: 4px;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }

    .camera-flip {
      min-height: 48px;
      width: 48px;
      padding: 0;
      background: rgba(6,3,16,0.6);
      border: 1px solid rgba(74,45,122,0.6);
      color: var(--silver);
      border-radius: 50%;
      font-size: 1.2rem;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 360px) {
      .btn-row { flex-direction: column; align-items: stretch; }
      .btn-row button { width: 100%; }
      .lucky-grid { flex-direction: column; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      header { padding-top: calc(0.6rem + var(--safe-top)); padding-bottom: 0.5rem; }
      header h1 { font-size: 1.3rem; }
      .header-sub { display: none; }
      .upload-card { padding: 1rem; }
      .upload-card .eye-icon { font-size: 2.2rem; margin-bottom: 0.4rem; }
    }
  </style>
</head>
<body>

  <!-- 背景レイヤー -->
  <div class="bg-layer bg-cosmos"></div>
  <div class="bg-layer bg-stars"></div>
  <div class="bg-layer bg-aurora"></div>

  <header>
    <span class="header-eye">🪬</span>
    <h1>神 秘 の 手 相 鑑 定</h1>
    <div class="ornament">
      <div class="ornament-line"></div>
      <span class="ornament-symbol">✦</span>
      <div class="ornament-line"></div>
    </div>
    <p class="header-sub">手のひらに刻まれた運命の線を読み解く</p>
  </header>

  <div class="container">

    <!-- アップロードエリア -->
    <div class="upload-card" id="dropZone">
      <span class="eye-icon">🔮</span>
      <h2>手のひらをご提示ください</h2>
      <p class="sub">JPG / PNG / WebP（最大10MB）</p>
      <div class="btn-row">
        <button class="btn-primary" onclick="openCamera()">📷 撮影して鑑定</button>
        <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">🖼️ 写真を選ぶ</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" />
      <input type="file" id="cameraInput" accept="image/*" capture="environment" />
    </div>

    <!-- プレビュー -->
    <div class="preview-area" id="previewArea">
      <div class="preview-wrap">
        <img id="previewImg" src="" alt="手相プレビュー" />
        <button class="preview-retake" onclick="resetPreview()">↩ 撮り直す</button>
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzePalm()">
        🔮 手相を鑑定する
      </button>
    </div>

    <!-- ローディング -->
    <div class="loading" id="loadingSection">
      <div class="loading-inner">
        <div class="crystal-ring2"></div>
        <div class="crystal-ring"></div>
        <span class="crystal">🔮</span>
      </div>
      <p class="loading-title">運命の線を読み解いています<span class="dots"></span></p>
      <p class="loading-sub">古の叡智があなたの手相を分析中</p>
    </div>

    <!-- エラー -->
    <div class="error-msg" id="errorMsg" style="display:none;"></div>

    <!-- 結果 -->
    <div class="result" id="resultSection">

      <div class="mystic-card result-card">
        <div class="card-header">
          <span class="card-header-icon">✨</span>
          <h3>総 合 鑑 定</h3>
          <div class="card-header-line"></div>
        </div>
        <p class="overall-text" id="overallText"></p>
      </div>

      <div class="mystic-card result-card">
        <div class="card-header">
          <span class="card-header-icon">📖</span>
          <h3>手 相 の 線</h3>
          <div class="card-header-line"></div>
        </div>
        <div id="linesContainer"></div>
      </div>

      <div class="mystic-card result-card">
        <div class="card-header">
          <span class="card-header-icon">🌙</span>
          <h3>運 勢 メ ッ セ ー ジ</h3>
          <div class="card-header-line"></div>
        </div>
        <div class="fortune-grid" id="fortuneGrid"></div>
      </div>

      <div class="mystic-card result-card">
        <div class="card-header">
          <span class="card-header-icon">⭐</span>
          <h3>ラ ッ キ ー 情 報</h3>
          <div class="card-header-line"></div>
        </div>
        <div class="lucky-grid" id="luckyGrid"></div>
      </div>

      <div class="mystic-card result-card">
        <div class="card-header">
          <span class="card-header-icon">💫</span>
          <h3>神 託 の 言 葉</h3>
          <div class="card-header-line"></div>
        </div>
        <p class="advice-text" id="adviceText"></p>
      </div>

      <button class="reset-btn" onclick="resetApp()">✦ もう一度鑑定する</button>
    </div>

  </div>

  <!-- カメラ -->
  <div class="camera-overlay" id="cameraOverlay">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div class="camera-guide">
      <span class="camera-guide-text">手のひらを枠内に合わせてください</span>
    </div>
    <div class="camera-controls">
      <button class="camera-close" onclick="closeCamera()">✕ 閉じる</button>
      <button class="camera-shutter" id="shutterBtn" onclick="capturePhoto()" aria-label="撮影"></button>
      <button class="camera-flip" onclick="flipCamera()" title="カメラ切替">🔄</button>
    </div>
  </div>

  <canvas id="captureCanvas" style="display:none;"></canvas>

  <footer>
    <div class="ornament" style="justify-content:center; margin-bottom:0.4rem;">
      <div class="ornament-line" style="max-width:60px;"></div>
      <span class="ornament-symbol" style="font-size:0.7rem;">✦</span>
      <div class="ornament-line" style="max-width:60px;"></div>
    </div>
    AIが手相を分析します。結果はエンターテイメント目的でご利用ください
  </footer>

  <script>
    let selectedImage = null;
    let cameraStream = null;
    let facingMode = 'environment';

    const fileInput      = document.getElementById('fileInput');
    const cameraInput    = document.getElementById('cameraInput');
    const dropZone       = document.getElementById('dropZone');
    const previewArea    = document.getElementById('previewArea');
    const previewImg     = document.getElementById('previewImg');
    const loadingSection = document.getElementById('loadingSection');
    const resultSection  = document.getElementById('resultSection');
    const errorMsg       = document.getElementById('errorMsg');

    fileInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (f) loadFile(f);
    });

    cameraInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (f) loadFile(f);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f);
    });

    function loadFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('画像ファイルを選択してください');
        return;
      }
      const reader = new FileReader();
      reader.onload = async (e) => {
        selectedImage = await resizeImage(e.target.result, 1280);
        previewImg.src = selectedImage;
        previewArea.style.display = 'block';
        hideError();
        vibrate(30);
      };
      reader.readAsDataURL(file);
    }

    function resizeImage(dataUrl, maxSize) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width <= maxSize && height <= maxSize) { resolve(dataUrl); return; }
          if (width > height) {
            height = Math.round(height * maxSize / width);
            width = maxSize;
          } else {
            width = Math.round(width * maxSize / height);
            height = maxSize;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.88));
        };
        img.src = dataUrl;
      });
    }

    async function openCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        cameraInput.click();
        return;
      }
      try {
        await startCameraStream();
        document.getElementById('cameraOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
      } catch {
        cameraInput.click();
      }
    }

    async function startCameraStream() {
      if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } }
      });
      document.getElementById('cameraVideo').srcObject = cameraStream;
    }

    async function flipCamera() {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      vibrate(20);
      try {
        await startCameraStream();
      } catch {
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
      }
    }

    function closeCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      document.getElementById('cameraOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    async function capturePhoto() {
      vibrate([30, 20, 60]);
      const video = document.getElementById('cameraVideo');
      const canvas = document.getElementById('captureCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const raw = canvas.toDataURL('image/jpeg', 0.92);
      selectedImage = await resizeImage(raw, 1280);
      previewImg.src = selectedImage;
      previewArea.style.display = 'block';
      hideError();
      closeCamera();
    }

    async function analyzePalm() {
      if (!selectedImage) return;
      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      vibrate(40);
      loadingSection.style.display = 'block';
      resultSection.style.display = 'none';
      hideError();
      previewArea.style.opacity = '0.5';
      loadingSection.scrollIntoView({ behavior: 'smooth', block: 'center' });

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: selectedImage }),
        });
        const data = await res.json();
        loadingSection.style.display = 'none';
        previewArea.style.opacity = '1';
        btn.disabled = false;
        if (data.error) { showError(data.error); return; }
        vibrate([40, 30, 80]);
        renderResult(data);
      } catch {
        loadingSection.style.display = 'none';
        previewArea.style.opacity = '1';
        btn.disabled = false;
        showError('通信エラーが発生しました。もう一度お試しください。');
      }
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderResult(data) {
      document.getElementById('overallText').textContent = data.overall || '';

      const linesContainer = document.getElementById('linesContainer');
      linesContainer.innerHTML = '';
      (data.lines || []).forEach(line => {
        const luck = Math.max(1, Math.min(5, parseInt(line.luck) || 3));
        const stars = Array.from({ length: 5 }, (_, i) =>
          `<span class="star ${i < luck ? 'filled' : ''}">${i < luck ? '⭐' : '☆'}</span>`
        ).join('');
        linesContainer.innerHTML += `
          <div class="line-item">
            <div class="line-header">
              <span class="line-name">${esc(line.emoji) || '✦'} ${esc(line.name)}</span>
              <div class="luck-stars">${stars}</div>
            </div>
            <p class="line-reading">${esc(line.reading)}</p>
          </div>`;
      });

      const f = data.fortune || {};
      document.getElementById('fortuneGrid').innerHTML = `
        <div class="fortune-item"><div class="label">💕 恋愛運</div><div class="value">${esc(f.love)}</div></div>
        <div class="fortune-item"><div class="label">💼 仕事運</div><div class="value">${esc(f.work)}</div></div>
        <div class="fortune-item"><div class="label">💚 健康運</div><div class="value">${esc(f.health)}</div></div>
        <div class="fortune-item"><div class="label">💰 金　運</div><div class="value">${esc(f.money)}</div></div>`;

      const l = data.lucky || {};
      document.getElementById('luckyGrid').innerHTML = `
        <div class="lucky-item"><div class="label">🎨 カラー</div><div class="value">${esc(l.color) || '—'}</div></div>
        <div class="lucky-item"><div class="label">🔢 ナンバー</div><div class="value">${esc(l.number) || '—'}</div></div>
        <div class="lucky-item"><div class="label">🧭 方位</div><div class="value">${esc(l.direction) || '—'}</div></div>`;

      document.getElementById('adviceText').textContent = data.advice || '';

      resultSection.style.display = 'block';
      setTimeout(() => resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    function resetPreview() {
      selectedImage = null;
      previewArea.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
      cameraInput.value = '';
      hideError();
    }

    function resetApp() {
      resetPreview();
      resultSection.style.display = 'none';
      loadingSection.style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() { errorMsg.style.display = 'none'; }

    function vibrate(pattern) {
      try { navigator.vibrate?.(pattern); } catch {}
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('cameraOverlay').classList.contains('open')) {
        closeCamera();
      }
    });
  </script>
</body>
</html>
